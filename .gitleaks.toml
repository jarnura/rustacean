title = "Gitleaks configuration for rustacean"

# Extend the default ruleset rather than replacing it.
[extend]
useDefault = true

# ---------------------------------------------------------------------------
# Allowlists
# ---------------------------------------------------------------------------
#
# Defense-in-depth: a global allowlist that suppresses rb_live_ strings whose
# hex suffix is shorter than the 32 hex chars produced by ApiKey::generate().
# Real keys (exactly 32 hex chars) are NOT covered and will still trigger a
# finding.
#
# Note: per-line `// gitleaks:allow` comments are the primary suppression
# mechanism for known test fixtures (gitleaks honors them across all rules
# and versions). This regex allowlist is a backstop in case a fixture is
# added without the inline directive.

[[allowlists]]
id = "rb-live-test-fixtures"
description = "rb_live_<short-suffix> are test fixtures, not real secrets."
# Match against the entire matched text (line context), not just the captured
# secret — required for the `generic-api-key` default rule, whose capture
# group does not always include the `rb_live_` prefix.
regexTarget = "match"
regexes = ['''rb_live_[a-z0-9]{1,31}(?:[^a-z0-9]|$)''']
