title = "Gitleaks configuration for rustacean"

# Extend the default ruleset rather than replacing it.
[extend]
useDefault = true

# ---------------------------------------------------------------------------
# Allowlists
# ---------------------------------------------------------------------------

[[allowlists]]
id = "rb-live-test-fixtures"
description = """
rb_live_ prefixed strings with fewer than 32 hex suffix characters are
test fixture constants, not real secrets. Real keys generated by ApiKey::generate()
always have exactly 32 lowercase hex characters after the prefix (rb_live_<32hex>).
Short-suffix occurrences (e.g. rb_live_abc123) in source files are always fixtures.
"""
# Matches rb_live_ followed by 1–31 hex/alphanumeric chars.
# Real API keys have exactly 32 hex chars after the prefix, so they are NOT
# covered by this allowlist and will still trigger a finding.
regexes = ['''rb_live_[a-z0-9]{1,31}(?:[^a-z0-9]|$)''']
