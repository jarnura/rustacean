name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ── Real Rust jobs ─────────────────────────────────────────────────────────

  cargo-check:
    name: cargo check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install rdkafka build dependencies
        run: sudo apt-get update -qq && sudo apt-get install -y cmake libssl-dev libsasl2-dev zlib1g-dev libcurl4-openssl-dev
      - run: cargo check --workspace

  cargo-test:
    name: cargo test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install rdkafka build dependencies
        run: sudo apt-get update -qq && sudo apt-get install -y cmake libssl-dev libsasl2-dev zlib1g-dev libcurl4-openssl-dev
      - run: cargo test --workspace

  clippy:
    name: clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: Install rdkafka build dependencies
        run: sudo apt-get update -qq && sudo apt-get install -y cmake libssl-dev libsasl2-dev zlib1g-dev libcurl4-openssl-dev
      - run: cargo clippy --workspace -- -D warnings

  # ── Script-backed jobs ─────────────────────────────────────────────────────

  file-size:
    name: file size (600-line cap)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: bash scripts/check-file-sizes.sh

  public-surface:
    name: public surface lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: bash scripts/check-pub-use.sh

  openapi-sync:
    name: openapi sync
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install rdkafka build dependencies
        run: sudo apt-get update -qq && sudo apt-get install -y cmake libssl-dev libsasl2-dev zlib1g-dev libcurl4-openssl-dev
      - run: bash scripts/check-openapi-sync.sh

  codegen-drift:
    name: codegen drift
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install rdkafka build dependencies
        run: sudo apt-get update -qq && sudo apt-get install -y cmake libssl-dev libsasl2-dev zlib1g-dev libcurl4-openssl-dev
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Build control-api binary
        run: cargo build -p control-api --quiet
      - name: Regenerate openapi.json in place
        run: ./target/debug/control-api print-openapi > openapi.json
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci
      - name: Regenerate frontend schema in place
        working-directory: frontend
        run: npm run gen:api
      - name: Detect drift via git diff
        run: |
          if ! git diff --exit-code openapi.json frontend/src/api/generated/schema.ts; then
            echo ""
            echo "::error::Generated artefacts are stale. Run the following commands and commit the result:"
            echo "::error::  cargo run -p control-api -- print-openapi > openapi.json"
            echo "::error::  cd frontend && npm run gen:api"
            exit 1
          fi

  frontend-typecheck:
    name: frontend typecheck
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Generated types match openapi.json
        run: npm run gen:api:check
      - name: TypeScript typecheck
        run: npm run typecheck
      - name: Lint
        run: npm run lint

  # ── Dependency graph & policy ──────────────────────────────────────────────

  crate-cycle:
    name: crate cycle check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Validate workspace dependency graph (cycles = cargo-check fail)
        run: cargo metadata --format-version 1 --no-deps > /dev/null
      - name: Check license / ban / source policies
        uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check bans licenses sources

  # ── Security ───────────────────────────────────────────────────────────────

  security-lint:
    name: security lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: cargo audit
        uses: rustsec/audit-check@v1.4.1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: secret scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Stub jobs (wired in later waves) ──────────────────────────────────────

  docker-build:
    name: docker build + push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to GitHub Container Registry
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push control-api image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/control-api/Dockerfile
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: ghcr.io/${{ github.repository }}/control-api:dev
          cache-from: type=gha
          cache-to: type=gha,mode=max

  playwright-e2e:
    name: playwright e2e
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run Playwright suite
        # Full wiring against compose/test.yml happens in Wave 8
        run: echo "playwright-e2e stub — wired in Wave 8"

  frontend-e2e:
    name: frontend e2e
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: pw-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('frontend/package-lock.json') }}
      - name: Install Playwright browsers
        if: steps.pw-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium
      - name: Install Playwright system deps (cache hit)
        if: steps.pw-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium
      - name: Build frontend bundle
        run: npm run build
      - name: Run Playwright E2E tests
        run: npx playwright test
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ github.run_id }}
          path: |
            frontend/playwright-report/
            frontend/test-results/
          retention-days: 30

  rb-feature-resolver-isolation:
    name: rb-feature-resolver isolation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check zero rb-* imports in rb-feature-resolver
        # Crate does not exist yet; stub ensures job slot exists in CI matrix
        run: echo "rb-feature-resolver-isolation stub — crate not yet created"

  tenant-isolation:
    name: tenant isolation
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: rustbrain
          POSTGRES_PASSWORD: rustbrain
          POSTGRES_DB: rustbrain
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      TEST_DATABASE_URL: postgres://rustbrain:rustbrain@localhost:5432/rustbrain
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Cross-tenant row count must be zero
        run: cargo test -p rb-storage-pg --test integration --test routing
