name: rustbrain-dev

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: rustbrain
      POSTGRES_PASSWORD: rustbrain
      POSTGRES_DB: rustbrain
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_HOST_PORT:-5432}:5432"
    networks:
      - rb-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rustbrain"]
      interval: 10s
      timeout: 5s
      retries: 5

  neo4j:
    image: neo4j:5-community
    environment:
      NEO4J_AUTH: neo4j/rustbrain123
      NEO4J_server_memory_heap_max__size: 4G
      NEO4J_server_memory_pagecache_size: 2G
    volumes:
      - neo4j_data:/data
    ports:
      - "${NEO4J_HTTP_HOST_PORT:-7474}:7474"
      - "${NEO4J_BOLT_HOST_PORT:-7687}:7687"
    networks:
      - rb-net
    deploy:
      resources:
        limits:
          memory: 8g
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7474 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  qdrant:
    image: qdrant/qdrant:v1.13.0
    volumes:
      - qdrant_data:/qdrant/storage
    ports:
      - "${QDRANT_REST_HOST_PORT:-6333}:6333"
      - "${QDRANT_GRPC_HOST_PORT:-6334}:6334"
    networks:
      - rb-net
    deploy:
      resources:
        limits:
          memory: 8g
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo >/dev/tcp/localhost/6333' 2>/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: apache/kafka:3.8.1
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: "PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093,EXTERNAL://0.0.0.0:9094"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:9092,EXTERNAL://${KAFKA_ADVERTISED_HOST:-localhost}:${KAFKA_HOST_PORT:-9094}"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:9093"
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      CLUSTER_ID: MkU3OEVhNTcwNTJENDM2Qk
    volumes:
      - kafka_data:/var/lib/kafka/data
    ports:
      - "${KAFKA_HOST_PORT:-9094}:9094"
    networks:
      - rb-net
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 30s

  kafka-init:
    image: apache/kafka:3.8.1
    depends_on:
      kafka:
        condition: service_healthy
    restart: "no"
    networks:
      - rb-net
    command: >
      bash -c "
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic rb.ingest.clone.commands     --partitions 6  --replication-factor 1 --config retention.ms=604800000 &&
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic rb.ingest.expand.commands    --partitions 6  --replication-factor 1 --config retention.ms=604800000 &&
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic rb.ingest.parse.commands     --partitions 6  --replication-factor 1 --config retention.ms=604800000 &&
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic rb.ingest.typecheck.commands --partitions 6  --replication-factor 1 --config retention.ms=604800000 &&
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic rb.ingest.graph.commands     --partitions 6  --replication-factor 1 --config retention.ms=604800000 &&
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic rb.ingest.embed.commands     --partitions 6  --replication-factor 1 --config retention.ms=604800000 &&
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic rb.source-files.v1           --partitions 6  --replication-factor 1 --config retention.ms=2592000000 &&
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic rb.projector.events          --partitions 12 --replication-factor 1 --config retention.ms=2592000000 &&
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic rb.audit.events              --partitions 3  --replication-factor 1 --config retention.ms=7776000000
      "

  loki:
    image: grafana/loki:3.4.2
    command: ["-config.file=/etc/loki/loki-config.yaml"]
    volumes:
      - ../infra/loki/loki-config.yaml:/etc/loki/loki-config.yaml:ro
      - loki_data:/loki
    ports:
      - "${LOKI_HOST_PORT:-3100}:3100"
    networks:
      - rb-net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3100/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.114.0
    command: ["--config=/etc/otel-collector/config.yaml"]
    volumes:
      - ../infra/otel-collector/config.yaml:/etc/otel-collector/config.yaml:ro
    ports:
      - "${OTEL_GRPC_HOST_PORT:-4317}:4317"
      - "${OTEL_HTTP_HOST_PORT:-4318}:4318"
    networks:
      - rb-net
    depends_on:
      - tempo
      - prometheus
      - loki

  tempo:
    image: grafana/tempo:2.7.2
    command: ["-config.file=/etc/tempo/tempo.yaml"]
    volumes:
      - ../infra/tempo/tempo.yaml:/etc/tempo/tempo.yaml:ro
      - tempo_data:/var/tempo
    ports:
      - "${TEMPO_HOST_PORT:-3200}:3200"
    networks:
      - rb-net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3200/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  prometheus:
    image: prom/prometheus:v3.2.0
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.retention.time=15d
    volumes:
      - ../infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "${PROMETHEUS_HOST_PORT:-9090}:9090"
    networks:
      - rb-net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9090/-/healthy || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  grafana:
    image: grafana/grafana:11.5.0
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
    volumes:
      - ../infra/grafana/provisioning:/etc/grafana/provisioning:ro
      - ../infra/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    ports:
      - "${GRAFANA_HOST_PORT:-3000}:3000"
    networks:
      - rb-net
    depends_on:
      - prometheus
      - tempo
      - loki
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  ollama:
    image: ollama/ollama:latest
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "${OLLAMA_HOST_PORT:-11434}:11434"
    networks:
      - rb-net

  rb-migrations:
    image: postgres:16-alpine
    environment:
      DATABASE_URL: postgres://rustbrain:rustbrain@postgres:5432/rustbrain
    volumes:
      - ../migrations:/migrations:ro
      - ./scripts/migrate-control.sh:/usr/local/bin/migrate-control.sh:ro
    command: ["sh", "/usr/local/bin/migrate-control.sh"]
    restart: "no"
    networks:
      - rb-net
    depends_on:
      postgres:
        condition: service_healthy

  control-api:
    build:
      context: ..
      dockerfile: docker/control-api/Dockerfile
    image: ghcr.io/jarnura/rustacean/control-api:dev
    environment:
      RB_DATABASE_URL: postgres://rustbrain:rustbrain@postgres:5432/rustbrain
      RB_LISTEN_ADDR: "0.0.0.0:8080"
      RB_CORS_ORIGINS: "${RB_CORS_ORIGINS:-http://localhost:15173}"
      RB_BASE_URL: "${RB_BASE_URL:-http://localhost:8080}"
      RB_EMAIL_TRANSPORT: console
      RB_SECURE_COOKIES: "${RB_SECURE_COOKIES:-false}"
      RB_GH_APP_ID: "${RB_GH_APP_ID:-}"
      RB_GH_APP_PRIVATE_KEY: "${RB_GH_APP_PRIVATE_KEY:-}"
      RB_GH_APP_WEBHOOK_SECRET: "${RB_GH_APP_WEBHOOK_SECRET:-dev-secret-do-not-use-in-prod}"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector:4317"
      OTEL_SERVICE_NAME: control-api
      RUST_LOG: "info,control_api=debug"
    ports:
      - "${CONTROL_API_HOST_PORT:-8080}:8080"
    networks:
      - rb-net
    depends_on:
      postgres:
        condition: service_healthy
      rb-migrations:
        condition: service_completed_successfully
      otel-collector:
        condition: service_started
    healthcheck:
      disable: true

  projector-pg:
    build:
      context: ..
      dockerfile: docker/projector-pg/Dockerfile
    image: ghcr.io/jarnura/rustacean/projector-pg:dev
    environment:
      DATABASE_URL: postgres://rustbrain:rustbrain@postgres:5432/rustbrain
      KAFKA_BOOTSTRAP_SERVERS: "kafka:9092"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector:4317"
      OTEL_SERVICE_NAME: projector-pg
      RUST_LOG: "info,projector_pg=debug"
    networks:
      - rb-net
    depends_on:
      postgres:
        condition: service_healthy
      rb-migrations:
        condition: service_completed_successfully
      kafka:
        condition: service_healthy
      otel-collector:
        condition: service_started

  caddy:
    image: caddy:2-alpine
    volumes:
      - ../infra/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
    ports:
      - "${CADDY_HTTP_HOST_PORT:-80}:80"
      - "${CADDY_HTTPS_HOST_PORT:-443}:443"
    networks:
      - rb-net
    depends_on:
      - otel-collector

  pgweb:
    image: sosedoff/pgweb:latest
    command: ["--readonly", "--bind", "0.0.0.0", "--listen", "8081"]
    environment:
      DATABASE_URL: postgres://rustbrain:rustbrain@postgres:5432/rustbrain?sslmode=disable
    ports:
      - "${PGWEB_HOST_PORT:-8081}:8081"
    networks:
      - rb-net
    depends_on:
      postgres:
        condition: service_healthy

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
      SERVER_PORT: 8082
    ports:
      - "${KAFKA_UI_HOST_PORT:-8082}:8082"
    networks:
      - rb-net
    depends_on:
      kafka:
        condition: service_healthy

  frontend:
    build:
      context: ..
      dockerfile: docker/frontend/Dockerfile
    image: rustbrain/frontend:dev
    ports:
      - "${FRONTEND_HOST_PORT:-15173}:80"
    networks:
      - rb-net
    depends_on:
      - control-api

networks:
  rb-net:
    driver: bridge

volumes:
  postgres_data:
  neo4j_data:
  qdrant_data:
  kafka_data:
  tempo_data:
  prometheus_data:
  grafana_data:
  loki_data:
  ollama_data:
  caddy_data:
